name: CI / Merge Validation

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  merge-validation:
    name: merge-validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache-dependency-path: backend/go.sum

      - name: run-e2e-smoke
        run: make e2e

      # `/run-e2e` comment-command triggering is intentionally deferred.
