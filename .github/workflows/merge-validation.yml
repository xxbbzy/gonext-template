name: CI / Merge Validation

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  merge-validation:
    name: merge-validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25.x"
          cache-dependency-path: backend/go.sum

      - name: run-e2e-smoke
        run: make e2e

      # PR-time smoke validation lives in ci-quality-gate.yml; this workflow keeps post-merge coverage aligned.
      # `/run-e2e` comment-command triggering is intentionally deferred.
