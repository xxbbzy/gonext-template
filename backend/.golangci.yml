run:
  timeout: 5m
  go: "1.21"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/xxbbzy/gonext-template

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
    - path: docs/
      linters:
        - all
