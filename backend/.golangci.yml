version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/xxbbzy/gonext-template

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
    - path: docs/
      linters:
        - all
