openapi: "3.0.3"
info:
  title: GoNext Template API
  description: AI-Friendly 全栈项目脚手架 API
  version: "1.0.0"
  contact:
    name: GoNext Template

servers:
  - url: http://localhost:8080
    description: Development server

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    XRequestID:
      name: X-Request-ID
      in: header
      required: false
      description: Optional caller-supplied request ID used for request/response log correlation.
      schema:
        type: string

  headers:
    XRequestID:
      description: Effective request ID associated with this response.
      schema:
        type: string

  schemas:
    Response:
      type: object
      required: [code, data, message]
      properties:
        code:
          type: integer
        data:
          nullable: true
        message:
          type: string

    ErrorResponse:
      type: object
      required: [code, data, message]
      properties:
        code:
          type: integer
          description: Non-zero application error code
        data:
          nullable: true
          description: Always null for error responses
        message:
          type: string
          description: Human-readable error message

    RegisterRequest:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
          maxLength: 100

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    AuthResponse:
      type: object
      required: [access_token, refresh_token, user]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        user:
          $ref: "#/components/schemas/UserResponse"

    UserResponse:
      type: object
      required: [id, username, email, role]
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        role:
          type: string

    CreateItemRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          maxLength: 200
        description:
          type: string
        status:
          type: string
          enum: [active, inactive]

    UpdateItemRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 200
        description:
          type: string
        status:
          type: string
          enum: [active, inactive]

    ItemResponse:
      type: object
      required:
        [id, title, description, status, user_id, created_at, updated_at]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        status:
          type: string
        user_id:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PagedItemsResponse:
      type: object
      required: [items, total, page, page_size, total_pages]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ItemResponse"
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
        total_pages:
          type: integer

    UploadResponse:
      type: object
      required: [url, filename, size]
      properties:
        url:
          type: string
        filename:
          type: string
        size:
          type: integer

    AuthSuccessResponse:
      type: object
      required: [code, data, message]
      properties:
        code:
          type: integer
          enum: [0]
        data:
          $ref: "#/components/schemas/AuthResponse"
        message:
          type: string
          enum: [success]

    UserSuccessResponse:
      type: object
      required: [code, data, message]
      properties:
        code:
          type: integer
          enum: [0]
        data:
          $ref: "#/components/schemas/UserResponse"
        message:
          type: string
          enum: [success]

    ItemSuccessResponse:
      type: object
      required: [code, data, message]
      properties:
        code:
          type: integer
          enum: [0]
        data:
          $ref: "#/components/schemas/ItemResponse"
        message:
          type: string
          enum: [success]

    PagedItemsSuccessResponse:
      type: object
      required: [code, data, message]
      properties:
        code:
          type: integer
          enum: [0]
        data:
          $ref: "#/components/schemas/PagedItemsResponse"
        message:
          type: string
          enum: [success]

    UploadSuccessResponse:
      type: object
      required: [code, data, message]
      properties:
        code:
          type: integer
          enum: [0]
        data:
          $ref: "#/components/schemas/UploadResponse"
        message:
          type: string
          enum: [success]

    EmptySuccessResponse:
      type: object
      required: [code, data, message]
      properties:
        code:
          type: integer
          enum: [0]
        data:
          nullable: true
          description: Null for successful operations without a payload
        message:
          type: string
          enum: [success]

paths:
  /healthz:
    get:
      operationId: livenessCheck
      summary: Liveness check
      tags: [Health]
      parameters:
        - $ref: "#/components/parameters/XRequestID"
      responses:
        "200":
          description: Service is alive
          headers:
            X-Request-ID:
              $ref: "#/components/headers/XRequestID"

  /readyz:
    get:
      operationId: readinessCheck
      summary: Readiness check
      tags: [Health]
      parameters:
        - $ref: "#/components/parameters/XRequestID"
      responses:
        "200":
          description: Service is ready
          headers:
            X-Request-ID:
              $ref: "#/components/headers/XRequestID"
        "503":
          description: Service is not ready
          headers:
            X-Request-ID:
              $ref: "#/components/headers/XRequestID"

  /api/v1/auth/register:
    post:
      operationId: registerUser
      x-middleware-group: public
      summary: Register a new user
      tags: [Auth]
      parameters:
        - $ref: "#/components/parameters/XRequestID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registration successful
          headers:
            X-Request-ID:
              $ref: "#/components/headers/XRequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSuccessResponse"
        "400":
          description: Validation error
          headers:
            X-Request-ID:
              $ref: "#/components/headers/XRequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already registered
          headers:
            X-Request-ID:
              $ref: "#/components/headers/XRequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          headers:
            X-Request-ID:
              $ref: "#/components/headers/XRequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/login:
    post:
      operationId: loginUser
      x-middleware-group: public
      summary: Login with credentials
      tags: [Auth]
      parameters:
        - $ref: "#/components/parameters/XRequestID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          headers:
            X-Request-ID:
              $ref: "#/components/headers/XRequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSuccessResponse"
        "401":
          description: Invalid credentials
          headers:
            X-Request-ID:
              $ref: "#/components/headers/XRequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "400":
          description: Validation error
          headers:
            X-Request-ID:
              $ref: "#/components/headers/XRequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          headers:
            X-Request-ID:
              $ref: "#/components/headers/XRequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/refresh:
    post:
      operationId: refreshToken
      x-middleware-group: public
      summary: Refresh access token
      tags: [Auth]
      parameters:
        - $ref: "#/components/parameters/XRequestID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Token refreshed
          headers:
            X-Request-ID:
              $ref: "#/components/headers/XRequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSuccessResponse"
        "401":
          description: Invalid or expired refresh token
          headers:
            X-Request-ID:
              $ref: "#/components/headers/XRequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "400":
          description: Validation error
          headers:
            X-Request-ID:
              $ref: "#/components/headers/XRequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          headers:
            X-Request-ID:
              $ref: "#/components/headers/XRequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/profile:
    get:
      operationId: getProfile
      x-middleware-group: authenticated
      summary: Get current user profile
      tags: [Auth]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XRequestID"
      responses:
        "200":
          description: User profile
          headers:
            X-Request-ID:
              $ref: "#/components/headers/XRequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSuccessResponse"
        "401":
          description: Unauthorized
          headers:
            X-Request-ID:
              $ref: "#/components/headers/XRequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          headers:
            X-Request-ID:
              $ref: "#/components/headers/XRequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          headers:
            X-Request-ID:
              $ref: "#/components/headers/XRequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/items:
    get:
      operationId: listItems
      x-middleware-group: authenticated
      summary: List items with pagination
      tags: [Items]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XRequestID"
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 10
        - name: keyword
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive]
      responses:
        "200":
          description: Paginated items
          headers:
            X-Request-ID:
              $ref: "#/components/headers/XRequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedItemsSuccessResponse"
        "500":
          description: Internal server error
          headers:
            X-Request-ID:
              $ref: "#/components/headers/XRequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createItem
      x-middleware-group: authenticated
      summary: Create a new item
      tags: [Items]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XRequestID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateItemRequest"
      responses:
        "201":
          description: Item created
          headers:
            X-Request-ID:
              $ref: "#/components/headers/XRequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemSuccessResponse"
        "400":
          description: Validation error
          headers:
            X-Request-ID:
              $ref: "#/components/headers/XRequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          headers:
            X-Request-ID:
              $ref: "#/components/headers/XRequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/items/{id}:
    get:
      operationId: getItem
      x-middleware-group: authenticated
      summary: Get item by ID
      tags: [Items]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XRequestID"
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Item details
          headers:
            X-Request-ID:
              $ref: "#/components/headers/XRequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemSuccessResponse"
        "404":
          description: Item not found
          headers:
            X-Request-ID:
              $ref: "#/components/headers/XRequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          headers:
            X-Request-ID:
              $ref: "#/components/headers/XRequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateItem
      x-middleware-group: authenticated
      summary: Update an item
      tags: [Items]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XRequestID"
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateItemRequest"
      responses:
        "200":
          description: Item updated
          headers:
            X-Request-ID:
              $ref: "#/components/headers/XRequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemSuccessResponse"
        "404":
          description: Item not found
          headers:
            X-Request-ID:
              $ref: "#/components/headers/XRequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "400":
          description: Validation error
          headers:
            X-Request-ID:
              $ref: "#/components/headers/XRequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          headers:
            X-Request-ID:
              $ref: "#/components/headers/XRequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteItem
      x-middleware-group: authenticated
      summary: Soft delete an item
      tags: [Items]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XRequestID"
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Item deleted
          headers:
            X-Request-ID:
              $ref: "#/components/headers/XRequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptySuccessResponse"
        "404":
          description: Item not found
          headers:
            X-Request-ID:
              $ref: "#/components/headers/XRequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          headers:
            X-Request-ID:
              $ref: "#/components/headers/XRequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/upload:
    post:
      operationId: uploadFile
      x-middleware-group: authenticated
      summary: Upload a file
      tags: [Upload]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XRequestID"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: File uploaded
          headers:
            X-Request-ID:
              $ref: "#/components/headers/XRequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadSuccessResponse"
        "400":
          description: File type not allowed
          headers:
            X-Request-ID:
              $ref: "#/components/headers/XRequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          description: File too large
          headers:
            X-Request-ID:
              $ref: "#/components/headers/XRequestID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
